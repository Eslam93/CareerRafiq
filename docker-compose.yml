services:
  careerrafiq:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8787:8787"
    env_file:
      - .env
    environment:
      PORT: 8787
      CAREERRAFIQ_START_API: 1
      CAREERRAFIQ_DB_FILE: /data/career-rafiq.db
      CAREERRAFIQ_UPLOADS_DIR: /data/uploads
      CAREERRAFIQ_WEB_DIST_DIR: /app/apps/web/dist
    volumes:
      - careerrafiq-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/ready').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  careerrafiq-data:
